# Это базовый рабочий процесс, который поможет вам начать работу с Действиями.

Имя: Имя

# Модерирует, когда будет запускаться рабочий процесс
на:
  # Запускает рабочий процесс при обработке событий запроса push или pull, но только для «основной» ветки.......
  толкать:
    Филиалы: [ "основной" ]
  pull_request:
    Филиалы: [ "основной" ]

  # Сначала запускаем этот рабочий процесс вручную на вкладке «Действия».».».».».».».».
  workflow_dispatch:

# Процесс выполнения рабочего процесса состоит из одного или нескольких заданий, которые могут выполняться последовательно или параллельно.........
рабочие места:
  # Этот рабочий процесс содержит одно задание под названием «сборка».».».».».».».».».».»."
  Строить:
    # Тип бегуна, на котором будет выполняться задание
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
